<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AI Fast-Track | CBK Innovative Minds</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: '#111827', surface: '#ffffff', background: '#F9FAFB' },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'slide-in-right': 'slideInRight 0.3s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        slideInRight: { '0%': { transform: 'translateX(100%)', opacity: '0' }, '100%': { transform: 'translateX(0)', opacity: '1' } }
                    }
                }
            }
        }
    </script>
    <style>
        * { scroll-behavior: smooth; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #D1D5DB; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .toast-exit { transform: translateX(100%); opacity: 0; transition: all 0.3s ease-in; }
        
        /* Tab transition helper - Strictly controls visibility */
        .tab-content, .profile-tab-content { display: none; }
        .tab-content.active, .profile-tab-content.active { display: block; }

        /* Floating Box Animation */
        @keyframes boxFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .float-box {
            animation: boxFloat 1.5s ease-in-out infinite;
            animation-play-state: paused;
            will-change: transform;
            transition: box-shadow 0.3s ease;
        }
        .float-box:hover {
            animation-play-state: running;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        /* Exam Specific Styles */
        .option-radio:checked + div { border-color: #111827; background-color: #f3f4f6; font-weight: 600; }
        .option-radio:checked + div .radio-inner { background-color: #111827; }
        .hide { display: none !important; }

        /* ═══════════════════════════════════════════════
           MOBILE LAYER — < 768px
           8px grid · touch targets · safe areas
           ═══════════════════════════════════════════════ */
        * { -webkit-tap-highlight-color: transparent; }
        body { padding-bottom: env(safe-area-inset-bottom); }

        /* ── BOTTOM NAV (mobile only) ── */
        #bottom-nav {
            display: none; /* hidden on desktop */
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #fff; border-top: 1px solid #EAECF0; z-index: 40;
            padding-bottom: env(safe-area-inset-bottom);
            box-shadow: 0 -4px 20px rgba(0,0,0,.05);
        }
        @media (max-width: 767px) { #bottom-nav { display: flex; } }

        .bnav-btn {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 6px 4px 8px; gap: 3px;
            border: none; background: none; cursor: pointer;
            color: #9CA3AF; font-size: 10px; font-weight: 500;
            letter-spacing: .01em; min-height: 52px; transition: color .12s;
        }
        .bnav-btn svg { width: 20px; height: 20px; stroke-width: 1.6; }
        .bnav-btn.active { color: #111827; }
        .bnav-btn.active svg { stroke-width: 2.2; }
        .bnav-dot { width: 3px; height: 3px; border-radius: 50%; background: #111827; opacity: 0; transform: scale(0); transition: all .15s; }
        .bnav-btn.active .bnav-dot { opacity: 1; transform: scale(1); }

        /* ── DRAWER (mobile sidebar replacement) ── */
        #mob-overlay { position: fixed; inset: 0; background: rgba(17,24,39,.4); z-index: 45; display: none; opacity: 0; transition: opacity .2s; }
        #mob-overlay.open { display: block; opacity: 1; }
        #mob-drawer { position: fixed; top: 0; left: 0; bottom: 0; width: 272px; background: #fff; z-index: 50; transform: translateX(-100%); transition: transform .26s cubic-bezier(.16,1,.3,1); display: flex; flex-direction: column; border-right: 1px solid #EAECF0; box-shadow: 4px 0 24px rgba(0,0,0,.08); }
        #mob-drawer.open { transform: translateX(0); }

        /* ── MOBILE LAYOUT OVERRIDES ── */
        @media (max-width: 767px) {
            /* Push content above bottom nav */
            #app-container { padding-bottom: calc(68px + env(safe-area-inset-bottom)) !important; }
            /* Hide desktop sidebar */
            #sidebar { display: none !important; }
            /* Header height */
            header { height: 48px !important; padding-left: 14px !important; padding-right: 14px !important; }
            /* Hamburger becomes drawer trigger */
            .mob-menu-btn { display: flex !important; }
            /* Timer badge smaller */
            #global-timer-display { font-size: 11px !important; padding: 3px 9px !important; margin: 0 auto; }
            /* Toast above nav */
            #toast-container { bottom: calc(60px + env(safe-area-inset-bottom) + 6px) !important; left: 12px !important; right: 12px !important; }
            #toast-container > div { width: 100% !important; }
            /* Touch targets */
            button { min-height: 44px; }
            /* Hide desktop progress bar label on tiny screens */
            .nav-progress-wrap { display: none; }
        }
        @media (min-width: 768px) {
            /* On desktop, hamburger is hidden */
            .mob-menu-btn { display: none !important; }
        }

        /* ── MOBILE PAGE CONTENT OVERRIDES ── */
        @media (max-width: 767px) {
            /* Overview layout: stack */
            .overview-2col { flex-direction: column !important; }
            .overview-sidebar-card { position: static !important; width: 100% !important; }
            /* Lesson layout: stack */
            .lesson-2col { flex-direction: column !important; }
            .lesson-module-nav { width: 100% !important; }
            /* Dashboard headers */
            .dash-h1 { font-size: 1.35rem !important; }
            /* Overview h1 */
            .overview-h1 { font-size: 1.4rem !important; }
            /* Profile hero */
            .profile-hero-row { flex-direction: column !important; align-items: center !important; text-align: center !important; }
            /* Cert actions */
            .cert-action-row { flex-direction: column !important; }
            /* Resume card */
            .resume-card-inner { flex-direction: column !important; align-items: flex-start !important; }
            .resume-card-btn { width: 100% !important; }
            /* Module card grids */
            .module-cards-grid { grid-template-columns: 1fr !important; }
            /* Referral row */
            .referral-row { flex-direction: column !important; }
            /* Profile tabs overflow */
            .profile-tabs-row { overflow-x: auto; -webkit-overflow-scrolling: touch; }
            /* Tab row */
            .tab-row-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
            /* Exam question text */
            #question-text { font-size: 1.1rem !important; line-height: 1.55 !important; }
            /* Score circle */
            .score-circle-wrap { width: 120px !important; height: 120px !important; }
            #final-score { font-size: 2rem !important; }
            /* Subscription card */
            .subscription-card-inner { flex-direction: column !important; align-items: flex-start !important; }
            /* Stat cards */
            .stat-num-big { font-size: 2rem !important; }
        }

        /* ── SCROLLBAR HIDE on mobile ── */
        @media (max-width: 767px) {
            .profile-tabs-row::-webkit-scrollbar,
            .tab-row-scroll::-webkit-scrollbar { display: none; }
            .profile-tabs-row, .tab-row-scroll { scrollbar-width: none; -ms-overflow-style: none; }

            /* Profile dropdown — fixed to top-right on mobile, never overlaps content */
            #profile-menu {
                position: fixed !important;
                top: 52px !important;
                right: 10px !important;
                left: auto !important;
                max-width: calc(100vw - 20px);
                min-width: 180px;
                z-index: 9999 !important;
            }
        }

        /* ── TAP FEEDBACK ── */
        .tap { transition: transform .08s ease; }
        .tap:active { transform: scale(.97); }

        /* ── Lesson content protection: disable selection/copy on protected areas ── */
        .protected-content {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            position: relative;
        }
        /* Allow selection inside code blocks for legitimate copying of snippets */
        .protected-content pre, .protected-content code {
            -webkit-user-select: text;
            -moz-user-select: text;
            user-select: text;
        }

        /* ── Watermark: subtle repeating user identity overlay ── */
        #lesson-watermark {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 5;
            opacity: 0.05;
            overflow: hidden;
            display: flex;
            flex-wrap: wrap;
            align-content: space-around;
            justify-content: space-around;
            font-size: 13px;
            font-weight: 700;
            color: #111827;
            transform: rotate(-25deg) scale(1.4);
            user-select: none;
        }
        #lesson-watermark span { padding: 40px 30px; white-space: nowrap; }

        /* ── Blur lesson content when tab loses focus (deters quick recordings) ── */
        body.tab-hidden .protected-content {
            filter: blur(8px);
            transition: filter 0.15s ease;
        }
        .protected-content { transition: filter 0.15s ease; }

        /* ── Content protection (lesson views only) ── */
        .protected-content, .protected-content * {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        /* Allow selection in form inputs even inside protected areas */
        .protected-content input,
        .protected-content textarea,
        .protected-content select {
            -webkit-user-select: text;
            user-select: text;
        }

        /* ── Subtle identity watermark ── */
        #ci-watermark {
            position: fixed;
            bottom: 8px;
            right: 10px;
            font-size: 10px;
            color: rgba(0,0,0,0.12);
            font-family: Arial, sans-serif;
            font-weight: 600;
            pointer-events: none;
            z-index: 40;
            white-space: nowrap;
            user-select: none;
        }

        /* ── SIDEBAR NAV ── */
        #sidebar-nav { padding: 12px 0; }
        #sidebar-nav .nav-btn { cursor: pointer; border: none; background: none; }
        #sidebar-nav .nav-btn:focus-visible { outline: 2px solid #de00a5; outline-offset: 1px; }
        /* Active lesson — white text on dark */
        #sidebar-nav .nav-btn.bg-gray-900 { background: #111827 !important; color: #fff !important; }
        /* Mobile drawer mirrors desktop */
        #mob-drawer-nav .nav-btn { cursor: pointer; border: none; background: none; }

        /* ═══════════════════════════════════════════════════════
           DASHBOARD MOBILE RESPONSIVE SCALE — max 767px
           Only sizing/spacing. Zero content changes.
        ═══════════════════════════════════════════════════════ */
        @media (max-width: 767px) {

            /* ── Profile banner ───────────────────────────────── */
            #app-container .profile-banner-section,
            .profile-hero {
                padding: 20px 16px !important;
            }
            /* Profile banner name */
            #profile-banner-name {
                font-size: 1.25rem !important;   /* was 2rem+ */
            }
            /* Profile banner avatar */
            .profile-banner-avatar-wrap {
                width: 64px !important;
                height: 64px !important;
            }

            /* ── Overview sidebar card ────────────────────────── */
            /* Rating number */
            .text-6xl { font-size: 2rem !important; }
            /* Big emoji in overview */
            .text-5xl:not(.quiz-score) { font-size: 2rem !important; }
            /* Price */
            .text-4xl.font-black { font-size: 1.75rem !important; }

            /* ── Lesson / content area ────────────────────────── */
            /* Lesson title */
            .lesson-title-h2,
            #app-container h2.text-2xl,
            #app-container h2.text-3xl {
                font-size: 1.125rem !important;
                margin-bottom: 12px !important;
            }
            #app-container h2.text-xl {
                font-size: 1rem !important;
            }
            /* Lesson body text */
            #app-container p,
            #app-container .text-lg {
                font-size: 0.9375rem !important;
                line-height: 1.6 !important;
            }
            /* Lesson content padding */
            #app-container .p-8,
            #app-container .p-10 {
                padding: 16px !important;
            }
            #app-container .p-6 {
                padding: 14px !important;
            }

            /* ── Quiz / exam ──────────────────────────────────── */
            /* Score circle */
            #app-container .w-40.h-40 {
                width: 100px !important;
                height: 100px !important;
            }
            /* Quiz result title */
            #app-container #result-title {
                font-size: 1.25rem !important;
            }
            /* Final score number */
            #app-container #final-score {
                font-size: 1.75rem !important;
            }
            #app-container .text-4xl.font-extrabold {
                font-size: 1.5rem !important;
            }

            /* ── Dashboard progress stats ─────────────────────── */
            #app-container .dash-h1 {
                font-size: 1.125rem !important;
            }
            #app-container .text-4xl.font-black {
                font-size: 1.5rem !important;
            }

            /* ── Overview enroll/start card ───────────────────── */
            #app-container .rounded-2xl.p-6 {
                padding: 14px !important;
            }
            #app-container .rounded-2xl .text-xl {
                font-size: 1rem !important;
            }
            #app-container .py-3\.5 {
                padding-top: 12px !important;
                padding-bottom: 12px !important;
            }

            /* ── Profile tab sections ─────────────────────────── */
            #app-container .profile-tabs-row {
                gap: 0 !important;
            }
            #app-container .ptab {
                padding: 10px 12px !important;
                font-size: 0.8125rem !important;
            }

            /* ── Section spacing ──────────────────────────────── */
            #app-container .mb-6 { margin-bottom: 14px !important; }
            #app-container .mb-8 { margin-bottom: 18px !important; }
            #app-container .gap-6 { gap: 14px !important; }
            #app-container .gap-8 { gap: 16px !important; }
        }
    </style>
</head>
<body class="bg-background text-gray-800 font-sans h-screen overflow-hidden flex relative">

    <div id="mobile-overlay" class="fixed inset-0 bg-gray-900/50 z-20 hidden md:hidden transition-opacity" onclick="toggleMobileMenu()"></div>

    <aside id="sidebar" class="fixed md:static inset-y-0 left-0 transform -translate-x-full md:translate-x-0 w-72 bg-surface border-r border-gray-200 flex flex-col z-30 transition-transform duration-300 ease-in-out">
        <div class="h-16 flex items-center justify-between px-6 border-b border-gray-200 cursor-pointer hover:bg-gray-50 transition-colors" onclick="navigate('dashboard')">
            <div class="flex items-center">
                <img src="logo.png" alt="CI Minds" class="h-7 w-auto object-contain mr-2">
                <span class="font-bold text-base tracking-tight text-gray-900">CI MINDS</span>
            </div>
            <button class="md:hidden text-gray-500 hover:text-gray-800" onclick="toggleMobileMenu(event)">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        
        <nav class="flex-1 overflow-y-auto py-6 px-4 space-y-1" id="sidebar-nav"></nav>
        
        <div class="p-4 border-t border-gray-200 bg-gray-50/50">
            <button onclick="navigate('profile')" class="flex items-center w-full px-3 py-2 text-sm font-medium text-gray-700 rounded-lg hover:bg-gray-200 transition-colors">
                <svg class="w-5 h-5 mr-3 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                My Profile
            </button>
            <button onclick="resetData()" class="flex items-center w-full mt-2 px-3 py-2 text-sm font-medium text-red-600 rounded-lg hover:bg-red-50 transition-colors">
                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                Reset Progress
            </button>
        </div>
    </aside>

    <div class="flex-1 flex flex-col h-screen overflow-hidden relative">
        <header class="h-16 bg-surface border-b border-gray-200 flex items-center justify-between px-4 md:px-8 z-10 shrink-0">
            <div class="flex items-center">
                <button onclick="openMobDrawer()" class="mob-menu-btn p-2 -ml-1 text-gray-500 hover:text-gray-900 hover:bg-gray-100 rounded-lg transition-colors w-10 h-10 items-center justify-center" aria-label="Menu">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
            </div>
            
            <div id="global-timer-display" class="hide flex items-center bg-gray-100 px-4 py-1.5 rounded-full text-sm font-bold text-gray-900 border border-gray-200 shadow-sm mx-auto md:mx-0 md:mr-auto">
                <svg class="w-4 h-4 mr-2 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span id="global-time-left">30:00</span>
            </div>
            
            <div class="flex-1 flex justify-end items-center space-x-3 md:space-x-6">
                <div class="nav-progress-wrap hidden sm:flex items-center space-x-3" title="Course Progress">
                    <div class="text-sm font-medium text-gray-600">Progress: <span id="nav-progress-text" class="font-bold text-gray-900">0%</span></div>
                    <div class="w-32 h-2.5 bg-gray-200 rounded-full overflow-hidden shadow-inner">
                        <div id="nav-progress-bar" class="h-full bg-gray-900 transition-all duration-700 ease-out" style="width: 0%"></div>
                    </div>
                </div>
                
                <div class="w-px h-6 bg-gray-200 hidden sm:block"></div>
                
                <div class="relative">
                    <button onclick="toggleDropdown('profile-menu')" class="flex items-center space-x-2 focus:outline-none" aria-label="Profile menu">
                        <img src="https://ui-avatars.com/api/?name=User&background=111827&color=fff&rounded=true" alt="User Avatar" id="header-avatar" class="w-8 h-8 rounded-full border-2 border-transparent hover:border-gray-900 transition-colors" style="position:relative;z-index:1;">
                        <!-- Chevron hidden on mobile, shown on desktop only -->
                        <svg class="w-4 h-4 text-gray-400 hidden md:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </button>
                    <div id="profile-menu" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-lg border border-gray-200 py-2 z-50 animate-fade-in">
                        <div class="px-4 py-2 border-b border-gray-100 mb-1">
                            <p class="text-sm font-bold text-gray-900 tracking-wide" id="dropdown-username">—</p>
                        </div>
                        <button onclick="navigate('profile'); toggleDropdown('profile-menu')" class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 hover:text-gray-900 transition-colors">My Profile</button>
                    </div>
                </div>
            </div>
        </header>

        <main id="app-container" class="flex-1 overflow-y-auto bg-background p-4 md:p-8 relative"></main>
    </div>

    <!-- Subtle identity watermark — populated once user is known -->
    <div id="ci-watermark"></div>

    <!-- ── MOBILE BOTTOM NAV ── -->
    <nav id="bottom-nav" aria-label="Mobile navigation">
        <button class="bnav-btn active" id="bnav-overview" onclick="navigate('overview');syncBottomNav('overview')" aria-label="Overview">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            Overview<div class="bnav-dot"></div>
        </button>
        <button class="bnav-btn" id="bnav-dashboard" onclick="navigate('dashboard');syncBottomNav('dashboard')" aria-label="Home">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            Home<div class="bnav-dot"></div>
        </button>
        <button class="bnav-btn" id="bnav-learn" onclick="goLearnNext();syncBottomNav('learn')" aria-label="Learn">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
            Learn<div class="bnav-dot"></div>
        </button>
        <button class="bnav-btn" id="bnav-profile" onclick="navigate('profile');syncBottomNav('profile')" aria-label="Profile">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            Profile<div class="bnav-dot"></div>
        </button>
    </nav>

    <!-- ── MOBILE DRAWER ── -->
    <div id="mob-overlay" onclick="closeMobDrawer()"></div>
    <aside id="mob-drawer">
        <div style="height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid #F3F4F6;flex-shrink:0;">
            <div style="display:flex;align-items:center;gap:7px;cursor:pointer;" onclick="navigate('dashboard');closeMobDrawer()">
                <img src="logo.png" alt="CI Minds" style="height:22px;width:auto;object-fit:contain;">

            timerInterval: null

        // ── State persistence (localStorage) ─────────────────────────────────
        // Firebase cloud sync is bolted on at the bottom after DOMContentLoaded

        function init() {
            try {
                const uid = sessionStorage.getItem('ci_uid') || '';
                const key = uid ? 'cbkCourseState_' + uid : 'cbkCourseState';
                const saved = localStorage.getItem(key);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    state = { ...state, ...parsed, expandedModules: parsed.expandedModules || ['m1'] };
                    // enrolled:true is permanent — never downgrade
                    if (parsed.enrolled === true) state.enrolled = true;
                    // Only auto-advance to dashboard if not coming from "View Course" link
                    const _forceOverview = new URLSearchParams(window.location.search).get('view') === 'overview';
                    if (!_forceOverview && Object.keys(state.progress).length > 0 && state.view === 'overview') {
                        state.view = 'dashboard';
                    }
                }
            } catch (e) { console.warn('localStorage read failed', e); }

            // ── Handle ?view=overview param — must run after localStorage merge ──
            const _urlParams = new URLSearchParams(window.location.search);
            if (_urlParams.get('view') === 'overview') {
                state.view = 'overview';
                sessionStorage.setItem('_forceOverview', '1');
                window.history.replaceState({}, '', window.location.pathname);
                // Clear flag after a short delay so normal navigation works again
                setTimeout(() => sessionStorage.removeItem('_forceOverview'), 3000);
            } else {
                sessionStorage.removeItem('_forceOverview');
            }

            renderSidebar();
            navigate(state.view, state.activeLesson, false);
            updateNavProgress();

            document.addEventListener('click', (e) => {
                ['profile-menu'].forEach(id => {
                    const menu = document.getElementById(id);
                    const btn = menu ? menu.previousElementSibling : null;
                    if (menu && !menu.classList.contains('hidden') && !menu.contains(e.target) && btn && !btn.contains(e.target)) {
                        menu.classList.add('hidden');
                    }
                });
            });
        }

        function saveState() {
            try {
                const uid = sessionStorage.getItem('ci_uid') || '';
                const key = uid ? 'cbkCourseState_' + uid : 'cbkCourseState';
                // Read existing saved data — never downgrade enrolled:true
                try {
                    const existing = JSON.parse(localStorage.getItem(key) || '{}');
                    if (existing.enrolled === true) state.enrolled = true;
                } catch(_) {}
                localStorage.setItem(key, JSON.stringify(state));
            } catch (e) { console.warn('localStorage write failed', e); }

            // Cloud sync — send ONLY course-progress fields, never enrolled/paymentId
            // (those are managed independently by the payment module as top-level
            // Firestore fields and must never be overwritten by progress syncs).
            if (window._cloudSave) {
                window._cloudSave({
                    view: state.view,
                    activeLesson: state.activeLesson,
                    progress: state.progress,
                    quizScores: state.quizScores,
                    expandedModules: state.expandedModules
                });
            }
            updateNavProgress();
            renderSidebar();
        }

        function resetData() {
            if (confirm("Are you sure you want to reset all your progress? This cannot be undone.")) {
                try {
                    const uid = sessionStorage.getItem('ci_uid') || '';
                    const key = uid ? 'cbkCourseState_' + uid : 'cbkCourseState';
                    localStorage.removeItem(key);
                } catch(_) {}
                if (window._cloudReset) window._cloudReset();
                showToast('Progress has been reset.', 'info');
                setTimeout(() => location.reload(), 800);
            }
        }

        function getOverallProgress() {
            let total = 0, completed = 0;
            courseData.forEach(m => m.lessons.forEach(l => { total++; if (state.progress[l.id]) completed++; }));
            return total === 0 ? 0 : Math.round((completed / total) * 100);
        }

        function getModuleProgress(moduleId) {
            const module = courseData.find(m => m.id === moduleId);
            let total = module.lessons.length, completed = 0;
            module.lessons.forEach(l => { if (state.progress[l.id]) completed++; });
            return { total, completed, percent: Math.round((completed / total) * 100) };
        }

        function getNextLesson() {
            for (let m of courseData) {
                for (let l of m.lessons) {
                    if (!state.progress[l.id]) return l;
                }
            }
            return null;
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const colors = { success: 'bg-green-50 text-green-800 border-green-200', error: 'bg-red-50 text-red-800 border-red-200', info: 'bg-gray-100 text-gray-900 border-gray-300' };
            const icons = {
                success: '<svg class="w-5 h-5 mr-2 text-green-600" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>',
                error: '<svg class="w-5 h-5 mr-2 text-red-600" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>',
                info: '<svg class="w-5 h-5 mr-2 text-gray-600" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"></path></svg>'
            };
            toast.className = `flex items-center p-4 border rounded-xl shadow-lg pointer-events-auto animate-slide-in-right ${colors[type]}`;
            toast.innerHTML = `${icons[type]} <span class="text-sm font-semibold">${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.add('toast-exit'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        function navigate(view, payload = null, animate = true) {
            // ── PAYWALL GATE: block course access until enrolled ───────────────
            if (!state.enrolled && (view === 'dashboard' || view === 'lesson')) {
                view = 'overview';
                payload = null;
                showToast('Enroll to unlock the full course.', 'info');
            }

            if (view !== 'lesson' || (payload !== 'm4l2' && examState.timerInterval)) {
                clearInterval(examState.timerInterval);
                document.getElementById('global-timer-display').classList.add('hide');
            }

            state.view = view;
            state.activeLesson = (view === 'lesson') ? payload : null;
            saveState();
            
            const container = document.getElementById('app-container');
            const sidebar = document.getElementById('sidebar');
            if (sidebar && !sidebar.classList.contains('-translate-x-full') && window.innerWidth < 768) {
                toggleMobileMenu();
            }

            container.innerHTML = ''; 
            
            let html = '';
            if (view === 'overview') html = buildOverview();
            else if (view === 'dashboard') html = buildDashboard();
            else if (view === 'lesson') {
                let isExam = false;
                for(let m of courseData) {
                    let l = m.lessons.find(x => x.id === payload);
                    if(l && l.type === 'exam') isExam = true;
                }
                html = isExam ? buildExam() : buildLesson(payload);
            }
            else if (view === 'profile') html = buildProfile();
            
            container.innerHTML = html;

            // ── Apply content protection on lesson/exam views ────────────────
            if (view === 'lesson') {
                container.classList.add('protected-content');
            } else {
                container.classList.remove('protected-content');
            }

            if (animate) container.firstElementChild.classList.add('animate-fade-in');
            
            document.querySelectorAll('#sidebar-nav button.nav-btn').forEach(btn => btn.classList.remove('bg-gray-100', 'text-gray-900', 'font-semibold'));
            if(view === 'dashboard') { const dashBtn = document.getElementById('nav-dash'); if(dashBtn) dashBtn.classList.add('bg-gray-100', 'text-gray-900', 'font-semibold'); }
            else if (view === 'overview') { const navOver = document.getElementById('nav-overview'); if(navOver) navOver.classList.add('bg-gray-100', 'text-gray-900', 'font-semibold'); }

            if (view === 'lesson' && payload) {
                for (let m of courseData) {
                    if (m.lessons.some(l => l.id === payload)) {
                        if (!state.expandedModules.includes(m.id)) { state.expandedModules.push(m.id); saveState(); }
                        break;
                    }
                }
            }
        }

        // --- EXAM SYSTEM LOGIC & UI ---
        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function generateNewExam() {
            let shuffled = shuffleArray(examQuestionBank);
            examState.questions = shuffled.map(q => {
                if(q.options) {
                    const originalCorrectText = q.options[q.correct];
                    const shuffledOptions = shuffleArray(q.options);
                    const newCorrectIdx = shuffledOptions.indexOf(originalCorrectText);
                    return { ...q, options: shuffledOptions, correct: newCorrectIdx };
                }
                return q;
            });
            examState.currentIdx = 0;
            examState.userAnswers = {};
            examState.timeRemaining = 1800;
            document.getElementById('result-screen').classList.add('hide');
            startExamUI();
        }

        function startExamUI() {
            if(examState.questions.length === 0) {
                examState.questions = [...examQuestionBank];
            }
            examState.currentIdx = 0;
            examState.userAnswers = {};
            examState.timeRemaining = 1800;
            
            document.getElementById('start-screen').classList.add('hide');
            document.getElementById('exam-screen').classList.remove('hide');
            document.getElementById('global-timer-display').classList.remove('hide');
            startTimer();
            renderQuestion();
        }

        function startTimer() {
            clearInterval(examState.timerInterval);
            const timeDisplay = document.getElementById('global-time-left');
            
            examState.timerInterval = setInterval(() => {
                examState.timeRemaining--;
                const m = Math.floor(examState.timeRemaining / 60).toString().padStart(2, '0');
                const s = (examState.timeRemaining % 60).toString().padStart(2, '0');
                timeDisplay.textContent = `${m}:${s}`;
                
                if (examState.timeRemaining <= 300) timeDisplay.parentElement.classList.replace('bg-gray-100', 'bg-red-50');
                if (examState.timeRemaining <= 0) {
                    clearInterval(examState.timerInterval);
                    submitExam();
                }
            }, 1000);
        }

        window.saveExamAnswer = function(val) {
            examState.userAnswers[examState.currentIdx] = val;
        }

        window.nextExamQuestion = function() {
            if (examState.currentIdx < examState.questions.length - 1) {
                examState.currentIdx++;
                renderQuestion();
            } else {
                if(confirm("Are you sure you want to submit your exam?")) submitExam();
            }
        }

        window.prevExamQuestion = function() {
            if (examState.currentIdx > 0) {
                examState.currentIdx--;
                renderQuestion();
            }
        }

        function autoGrade(q, userAnswer) {
            if (q.options) return userAnswer === q.correct;
            if (!userAnswer || typeof userAnswer !== 'string') return false;
            const normalized = userAnswer.toLowerCase().trim();
            return q.acceptedKeywords.some(kw => normalized.includes(kw));
        }

        function submitExam() {
            clearInterval(examState.timerInterval);
            document.getElementById('global-timer-display').classList.add('hide');
            document.getElementById('exam-screen').classList.add('hide');
            
            let score = 0;
            let reviewHtml = '';

            examState.questions.forEach((q, idx) => {
                const ans = examState.userAnswers[idx];
                const isCorrect = autoGrade(q, ans);
                if (isCorrect) score++;

                let userText = q.options ? (ans !== undefined ? q.options[ans] : "Not answered") : (ans || "Not answered");
                let correctText = q.options ? q.options[q.correct] : `Keywords: ${q.acceptedKeywords.join(', ')}`;
                
                reviewHtml += `
                    <div class="bg-white border ${isCorrect ? 'border-green-200' : 'border-red-200'} rounded-xl p-5 mb-4 shadow-sm">
                        <div class="flex items-start gap-3">
                            <div class="${isCorrect ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'} w-8 h-8 rounded-full flex items-center justify-center font-bold shrink-0 mt-0.5">
                                ${isCorrect ? '✓' : '✗'}
                            </div>
                            <div class="flex-1">
                                <h4 class="font-bold text-gray-900 mb-2">${idx + 1}. ${q.question}</h4>
                                <div class="text-sm space-y-1 mb-3">
                                    <p class="${isCorrect ? 'text-green-700 font-medium' : 'text-red-600'}">Your Answer: ${userText}</p>
                                    ${!isCorrect ? `<p class="text-green-700 font-medium">Correct Answer: ${correctText}</p>` : ''}
                                </div>
                                <div class="bg-gray-50 text-gray-600 text-sm p-3 rounded-lg border border-gray-100">
                                    <strong class="text-gray-800">Explanation:</strong> ${q.explanation}
                                </div>
                            </div>
                        </div>
                    </div>`;
            });

            const pct = Math.round((score / examState.questions.length) * 100);
            const passed = pct >= 80;

            const header = document.getElementById('result-header');
            if (passed) {
                header.className = "p-8 md:p-12 text-center text-white bg-gradient-to-br from-green-500 to-emerald-700";
                document.getElementById('result-title').textContent = "Congratulations! 🎉";
                document.getElementById('result-subtitle').textContent = "You passed the Final Exam.";
                state.progress['m4l2'] = true;
                saveState();
                showToast("Certificate Unlocked!", "success");
            } else {
                header.className = "p-8 md:p-12 text-center text-white bg-gradient-to-br from-gray-800 to-gray-900";
                document.getElementById('result-title').textContent = "Almost there.";
                document.getElementById('result-subtitle').textContent = "You need 80% to pass. Review your mistakes and try again.";
            }

            document.getElementById('final-score').textContent = `${pct}%`;
            document.getElementById('review-container').innerHTML = reviewHtml;
            document.getElementById('result-screen').classList.remove('hide');
        }

        function renderQuestion() {
            const q = examState.questions[examState.currentIdx];
            const pct = Math.round(((examState.currentIdx + 1) / examState.questions.length) * 100);
            
            document.getElementById('question-counter').textContent = `Question ${examState.currentIdx + 1} of ${examState.questions.length}`;
            document.getElementById('exam-progress-percent').textContent = `${pct}%`;
            document.getElementById('exam-progress-bar').style.width = `${pct}%`;
            document.getElementById('q-module').textContent = q.module;
            document.getElementById('q-type').textContent = q.type === 'short' ? 'Short Answer' : (q.type === 'scenario' ? 'Multiple Choice' : 'Multiple Choice');
            document.getElementById('question-text').textContent = q.question;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            if (q.options) {
                q.options.forEach((opt, idx) => {
                    const isChecked = examState.userAnswers[examState.currentIdx] === idx ? 'checked' : '';
                    container.innerHTML += `
                        <label class="block relative cursor-pointer group">
                            <input type="radio" name="q${examState.currentIdx}" value="${idx}" class="option-radio sr-only" onchange="window.saveExamAnswer(${idx})" ${isChecked}>
                            <div class="p-4 md:p-5 border-2 border-gray-200 rounded-xl transition-all group-hover:border-gray-400 flex items-center bg-white">
                                <div class="w-5 h-5 rounded-full border-2 border-gray-300 mr-4 flex items-center justify-center shrink-0"><div class="radio-inner w-2.5 h-2.5 rounded-full transition-colors"></div></div>
                                <span class="text-gray-800 text-lg">${opt}</span>
                            </div>
                        </label>`;
                });
            } else {
                const savedText = examState.userAnswers[examState.currentIdx] || '';
                container.innerHTML = `<textarea rows="3" class="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-gray-900 focus:ring-0 text-lg transition-colors outline-none resize-none" placeholder="Type your answer here..." oninput="window.saveExamAnswer(this.value)">${savedText}</textarea>`;
            }

            document.getElementById('btn-prev').disabled = examState.currentIdx === 0;
            const nextBtn = document.getElementById('btn-next');
            if (examState.currentIdx === examState.questions.length - 1) {
                nextBtn.textContent = "Submit Exam";
                nextBtn.classList.replace('bg-gray-900', 'bg-green-600');
                nextBtn.classList.replace('hover:bg-gray-800', 'hover:bg-green-700');
            } else {
                nextBtn.innerHTML = "Next Question &rarr;";
                nextBtn.classList.replace('bg-green-600', 'bg-gray-900');
                nextBtn.classList.replace('hover:bg-green-700', 'hover:bg-gray-800');
            }
        }

        // --- STANDARD LESSON BUILDER ---
        function buildLesson(lessonId) {
            let currentModule, currentLesson, nextId = null, prevId = null;
            let found = false;

            for (let i = 0; i < courseData.length; i++) {
                for (let j = 0; j < courseData[i].lessons.length; j++) {
                    if (courseData[i].lessons[j].id === lessonId) {
                        currentModule = courseData[i]; currentLesson = courseData[i].lessons[j]; found = true;
                        if (j > 0) prevId = courseData[i].lessons[j-1].id;
                        else if (i > 0) prevId = courseData[i-1].lessons[courseData[i-1].lessons.length-1].id;
                        if (j < courseData[i].lessons.length - 1) nextId = courseData[i].lessons[j+1].id;
                        else if (i < courseData.length - 1) nextId = courseData[i+1].lessons[0].id;
                        break;
                    }
                }
                if (found) break;
            }

            if (!currentLesson) return `<div class="p-8 text-center"><h2 class="text-2xl font-bold text-gray-900">Lesson not found.</h2><button onclick="navigate('dashboard')" class="mt-4 text-gray-900 underline">Return to Dashboard</button></div>`;

            let contentHtml = '';

            return `

        function markCompleted(lessonId, nextId) {
            const wasCompleted = state.progress[lessonId];

            if (nextId && nextId !== 'null') navigate('lesson', nextId);
            else { navigate('dashboard'); if(getOverallProgress() === 100) setTimeout(() => showToast('Course 100% Completed! Certificate unlocked.', 'success'), 500); }

        function submitQuiz(lessonId, correctIdx, nextId) {
            const form = document.getElementById(`quiz-form-${lessonId}`);
            const selected = form.querySelector('input:checked');
            if (!selected) { showToast("Please select an answer first.", "error"); return; }
            const isCorrect = parseInt(selected.value) === correctIdx;
            state.quizScores[lessonId] = isCorrect ? 100 : 0;
            if (isCorrect) state.progress[lessonId] = true;
            saveState();
            if(isCorrect) showToast('Correct answer!', 'success');
            else showToast('Incorrect. Review the explanation and try again.', 'error');
            navigate('lesson', lessonId, false);

            delete state.quizScores[lessonId];

        async function downloadCertificate() {
            const btn = document.getElementById('cert-download-btn');
            const original = btn.innerHTML;
            btn.innerHTML = 'Generating…';
            btn.disabled = true;

            try {
                const certEl = document.getElementById('certificate-render');

                    scale: 2,
                    useCORS: true,
                    backgroundColor: '#000000'
                });
                const link = document.createElement('a');
                const name = (window._currentDisplayName || 'Student').replace(/\s+/g, '_');
                link.download = `CI_Minds_Certificate_${name}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                showToast('Certificate downloaded!', 'success');
            } catch (err) {
                console.error('[CI Minds] Certificate download failed:', err);
                showToast('Download failed. Try a screenshot instead.', 'error');
            } finally {
                btn.innerHTML = original;
                btn.disabled = false;
            }
        }

        window.openCertificateModal  = openCertificateModal;
        window.closeCertificateModal = closeCertificateModal;
        window.downloadCertificate   = downloadCertificate;

        // ── Blur lesson content when tab loses focus (deters quick screen recordings) ──
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                document.body.classList.add('tab-hidden');
            } else {
                document.body.classList.remove('tab-hidden');
            }
        });
        // Also blur on window blur (switching to another app)
        window.addEventListener('blur', () => document.body.classList.add('tab-hidden'));
        window.addEventListener('focus', () => document.body.classList.remove('tab-hidden'));

        // ── Boot: call init() on DOMContentLoaded, then sync mobile nav ──
        window.addEventListener('DOMContentLoaded', function() {
            init();
            setTimeout(() => {
                syncBottomNav((state.view === 'lesson') ? 'learn' : state.view);

    <!-- ── Firebase: auth guard + cloud sync ────────────────────────────────── -->
    <script type="module">
        import {
            onAuthChange,
            firebaseSignOut,
            saveProgressToCloud,
            loadProgressFromCloud,
            db
        } from './firebase-config.js';

        import {
            doc, getDoc, setDoc, serverTimestamp
        } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        // onAuthChange fires as soon as Firebase resolves the session.
        // The dashboard has ALREADY rendered from localStorage by this point
        // (init() ran on DOMContentLoaded above), so we just:
        //   1. redirect if no user
        //   2. patch in the real user info + cloud helpers
        //   3. silently sync any newer cloud progress

        onAuthChange(async (user) => {

            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            // Store UID so future saveState() calls key localStorage per-user
            sessionStorage.setItem('ci_uid', user.uid);

            // ── ENROLLMENT CHECK — must run BEFORE progress sync below ─────────
            // Firestore's top-level `enrolled` field is authoritative. Read it
            // now so the paywall gate (in navigate()) never incorrectly locks
            // a paid user out while progress is being synced.
            try {
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    if (data.enrolled === true) {
                        state.enrolled   = true;
                        state.enrolledAt = data.enrolledAt || null;
                        state.paymentId  = data.paymentId  || null;
                        // Persist to localStorage so it's instant on next load
                        try {
                            const lsKey = 'cbkCourseState_' + user.uid;
                            const existing = JSON.parse(localStorage.getItem(lsKey) || '{}');
                            existing.enrolled  = true;
                            existing.paymentId = state.paymentId;
                            localStorage.setItem(lsKey, JSON.stringify(existing));
                        } catch(_) {}
                    } else if (state.enrolled === true && state.paymentId) {
                        // localStorage says enrolled but Firestore doesn't — resync
                        console.log('[CI Minds] Resyncing payment to Firestore...');
                        await setDoc(doc(db, 'users', user.uid), {
                            enrolled:   true,
                            enrolledAt: serverTimestamp(),
                            paymentId:  state.paymentId
                        }, { merge: true }).catch(e => console.warn('[CI Minds] Resync failed:', e.message));
                    }
                }
            } catch (err) {
                console.warn('[CI Minds] Enrollment check failed:', err.message);
                // Fall back to whatever localStorage already set in init()
            }

            // Wire cloud save/reset helpers (saveState calls these if present)
            window._cloudSave = (stateData) => {
                saveProgressToCloud(user.uid, stateData).catch(() => {});
            };
            window._cloudReset = () => {
                saveProgressToCloud(user.uid, {
                    view: 'overview', activeLesson: null,
                    progress: {}, quizScores: {}, expandedModules: ['m1']
                }).catch(() => {});
            };
            window._firebaseSignOut = async () => {
                sessionStorage.removeItem('ci_uid');
                await firebaseSignOut();
            };

            // ── Update ALL name + avatar spots with real user data ──────────────
            const displayName = user.displayName || user.email.split('@')[0];
            const firstName   = displayName.split(' ')[0];
            const initials    = displayName.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
            const avatarUrl   = user.photoURL ||
                `https://ui-avatars.com/api/?name=${encodeURIComponent(displayName)}&background=111827&color=fff&rounded=true&size=128`;
            const avatarUrlSm = user.photoURL ||
                `https://ui-avatars.com/api/?name=${encodeURIComponent(displayName)}&background=111827&color=fff&rounded=true&size=64`;

            // Store globally so buildProfile() and welcome message can read it live
            window._currentDisplayName = displayName;
            window._currentAvatarUrl   = avatarUrl;
            window._currentUserEmail   = user.email;

            // 1. Header dropdown name
            const dropdownName = document.getElementById('dropdown-username');
            if (dropdownName) dropdownName.textContent = displayName.toUpperCase();

            // 2. Header small avatar
            const headerAvatar = document.getElementById('header-avatar');
            if (headerAvatar) headerAvatar.src = avatarUrlSm;

            // 3. Profile banner big avatar
            const bannerAvatar = document.getElementById('profile-banner-avatar');
            if (bannerAvatar) bannerAvatar.src = avatarUrl;

            // 4. Profile banner name
            const bannerName = document.getElementById('profile-banner-name');
            if (bannerName) bannerName.textContent = displayName.toUpperCase();

            // 5. Referral link — use first name + last 2 chars of uid
            const refInput = document.getElementById('referral-link-input');
            if (refInput) {
                const handle = (firstName + user.uid.slice(-2)).toUpperCase();
                refInput.value = `https://cbkminds.com/ref/${handle}`;
            }

            // 6. If profile page is already rendered (before auth resolved),
            //    re-render it now so name/avatar are correct on mobile
            if (state.view === 'profile') {
                navigate('profile', null, false);
            }

            // Inject Sign Out into dropdown (only once)
            const profileMenu = document.getElementById('profile-menu');
            if (profileMenu && !document.getElementById('signout-btn')) {
                const sep = document.createElement('div');
                sep.className = 'border-t border-gray-100 my-1';
                profileMenu.appendChild(sep);
                const btn = document.createElement('button');
                btn.id = 'signout-btn';
                btn.className = 'w-full text-left px-4 py-2 text-sm text-red-500 hover:bg-red-50 transition-colors font-medium';
                btn.textContent = 'Sign Out';
                btn.onclick = async () => {
                    if (window._firebaseSignOut) await window._firebaseSignOut();
                    window.location.href = 'index.html';
                };
                profileMenu.appendChild(btn);
            }

            // Silently load cloud progress — only re-render if it has MORE progress
            try {
                const cloudData = await loadProgressFromCloud(user.uid);
                if (cloudData && cloudData.progress) {
                    const localCount = Object.keys(state.progress || {}).length;
                    const cloudCount = Object.keys(cloudData.progress).length;
                    if (cloudCount > localCount) {
                        const wasEnrolled = state.enrolled; // preserve local enrolled flag
                        state = { ...state, ...cloudData, expandedModules: cloudData.expandedModules || ['m1'] };
                        // Never downgrade enrolled status — if user paid, stay unlocked
                        if (wasEnrolled) state.enrolled = true;
                        // Don't auto-navigate away from overview if user explicitly came here
                        const _urlForced = sessionStorage.getItem('_forceOverview');
                        if (!_urlForced && Object.keys(state.progress).length > 0 && state.view === 'overview') {
                            state.view = 'dashboard';
                        }
                        renderSidebar();
                        navigate(state.view, state.activeLesson, false);
                        updateNavProgress();
                    }
                }
            } catch (_) { /* cloud unavailable — localStorage render is fine */ }
        });
    </script>

        const RAZORPAY_KEY_ID = 'rzp_test_XXXXXXXXXXXXXXXX';
        // ── ▲▲▲ ─────────────────────────────────────────────────────────────

        const COURSE_AMOUNT = 9900;   // ₹99 in paise (100 paise = ₹1)
        const COURSE_NAME   = 'AI Fast-Track — CI Minds';

        let _currentUser = null;  // set once auth resolves

        // ── Record payment + unlock in Firestore ─────────────────────────────
        async function recordPaymentAndUnlock(uid, paymentData) {
            try {
                // 1. Write immutable payment record
                await setDoc(doc(db, 'users', uid, 'payments', paymentData.razorpay_payment_id), {
                    razorpay_payment_id: paymentData.razorpay_payment_id,
                    razorpay_order_id:   paymentData.razorpay_order_id  || '',
                    razorpay_signature:  paymentData.razorpay_signature || '',
                    amount:   COURSE_AMOUNT,
                    currency: 'INR',
                    course:   'ai-fast-track',
                    paidAt:   serverTimestamp(),
                    uid:      uid
                });
                // 2. Set enrolled flag on user doc
                await setDoc(doc(db, 'users', uid), {
                    enrolled:   true,
                    enrolledAt: serverTimestamp(),
                    paymentId:  paymentData.razorpay_payment_id
                }, { merge: true });
                return true;
            } catch (err) {
                console.error('[CI Minds] Firestore write failed:', err);
                return false;
            }
        }

        // ── Reset enroll button to default state ─────────────────────────────
        function resetEnrollBtn() {
            const btn = document.getElementById('enroll-btn');
            if (!btn) return;
            btn.disabled = false;
            btn.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg> Enroll Now — ₹99`;
        }

        // ── initiatePayment — exposed globally, always available ─────────────
        window.initiatePayment = function() {
            // Guard: must be logged in
            if (!_currentUser) {
                showToast('Please sign in before enrolling.', 'info');
                return;
            }

            // Guard: Razorpay key must be configured
            if (!RAZORPAY_KEY_ID || RAZORPAY_KEY_ID.includes('XXXXX')) {
                showToast('Payment gateway not configured yet. Please add your Razorpay key.', 'error');
                console.error('[CI Minds] Set your Razorpay KEY_ID in dashboard.html');
                return;
            }

            // Guard: Razorpay SDK must be loaded
            if (typeof Razorpay === 'undefined') {
                showToast('Payment gateway failed to load. Check your connection.', 'error');
                return;
            }

            const btn = document.getElementById('enroll-btn');
            if (btn) { btn.textContent = 'Opening checkout…'; btn.disabled = true; }

            const options = {
                key:         RAZORPAY_KEY_ID,
                amount:      COURSE_AMOUNT,
                currency:    'INR',
                name:        'CI Minds',
                description: COURSE_NAME,
                image:       'https://ui-avatars.com/api/?name=CI&background=111827&color=fff&size=80&bold=true',
                prefill: {
                    name:  _currentUser.displayName || '',
                    email: _currentUser.email        || '',
                },
                theme: { color: '#111827' },
                modal: {
                    ondismiss: function() { resetEnrollBtn(); }
                },
                handler: async function(response) {
                    if (!response.razorpay_payment_id) {
                        showToast('Payment could not be verified. Contact support@cbkminds.com', 'error');
                        resetEnrollBtn();
                        return;
                    }

                    if (btn) { btn.textContent = 'Unlocking course…'; }

                    // ── UNLOCK IMMEDIATELY — payment already happened ──────────
                    // Never keep a paying user locked out waiting for Firestore.
                    // Unlock the UI right now, then save to Firestore in background.
                    state.enrolled  = true;
                    state.paymentId = response.razorpay_payment_id;

                    // Save to localStorage instantly so it survives refresh
                    try {
                        const uid = _currentUser.uid;
                        const key = 'cbkCourseState_' + uid;
                        const current = JSON.parse(localStorage.getItem(key) || '{}');
                        current.enrolled  = true;
                        current.paymentId = response.razorpay_payment_id;
                        localStorage.setItem(key, JSON.stringify(current));
                    } catch(_) {}

                    // Show success and unlock UI
                    showToast('🎉 Payment successful! Your course is now unlocked.', 'success');
                    renderSidebar();
                    setTimeout(() => { navigate('dashboard', null, true); }, 700);

                    // Save to Firestore in background — failure doesn't affect the user
                    recordPaymentAndUnlock(_currentUser.uid, response).then(saved => {
                        if (!saved) {
                            // Firestore write failed — log it but user is already unlocked
                            console.error('[CI Minds] Firestore payment record failed. Payment ID:', response.razorpay_payment_id);
                            // Retry once after 3 seconds
                            setTimeout(() => {
                                recordPaymentAndUnlock(_currentUser.uid, response).catch(e =>
                                    console.error('[CI Minds] Retry also failed:', e)
                                );
                            }, 3000);
                        }
                    });
                }
            };

            try {
                const rzp = new Razorpay(options);
                rzp.on('payment.failed', function(resp) {
                    showToast('Payment failed: ' + (resp.error.description || 'Please try again.'), 'error');
                    resetEnrollBtn();
                });
                rzp.open();
            } catch (err) {
                console.error('[CI Minds] Razorpay error:', err);
                showToast('Could not open payment window. Try refreshing the page.', 'error');
                resetEnrollBtn();
            }
        };

        // ── Single-session enforcement ────────────────────────────────────────
        // Generate or reuse a session ID for THIS browser tab/device.
        // Stored in sessionStorage so each new tab/device gets a fresh ID,
        // but refreshing the same tab keeps the same ID.
        function getMySessionId() {
            let sid = sessionStorage.getItem('ci_session_id');
            if (!sid) {
                sid = 'sess_' + Date.now() + '_' + Math.random().toString(36).slice(2, 10);
                sessionStorage.setItem('ci_session_id', sid);
            }
            return sid;
        }

        let _sessionUnsubscribe = null;

        async function enforceSingleSession(user) {
            const mySessionId = getMySessionId();
            const userRef = doc(db, 'users', user.uid);

            try {
                // Claim this session as the active one (last login wins)
                await setDoc(userRef, {
                    activeSession: mySessionId,
                    activeSessionAt: serverTimestamp(),
                    activeSessionDevice: navigator.userAgent.slice(0, 120)
                }, { merge: true });
            } catch (err) {
                console.warn('[CI Minds] Session claim failed:', err.message);
                return; // don't enforce if we can't even write
            }

            // Listen for changes — if activeSession changes to something else,
            // this device is no longer the active one.
            if (_sessionUnsubscribe) _sessionUnsubscribe();
            _sessionUnsubscribe = onSnapshot(userRef, (snap) => {
                if (!snap.exists()) return;
                const remoteSession = snap.data().activeSession;
                if (remoteSession && remoteSession !== mySessionId) {
                    // Another device has logged in — sign this one out
                    handleForcedSignOut();
                }
            });
        }

        async function handleForcedSignOut() {
            if (_sessionUnsubscribe) { _sessionUnsubscribe(); _sessionUnsubscribe = null; }
            sessionStorage.removeItem('ci_session_id');
            sessionStorage.removeItem('ci_uid');

            // ── Polished sign-out modal, matches site branding ────────────────
            const overlay = document.createElement('div');
            overlay.id = 'forced-signout-overlay';
            overlay.style.cssText = 'position:fixed;inset:0;z-index:999999;background:rgba(17,24,39,0.7);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;transition:opacity 0.25s ease;';
            overlay.innerHTML = `
                <div style="background:#fff;border-radius:20px;padding:36px 32px;max-width:380px;width:100%;text-align:center;font-family:Arial,Helvetica,sans-serif;box-shadow:0 20px 60px rgba(0,0,0,0.3);transform:translateY(16px) scale(0.97);transition:transform 0.3s cubic-bezier(.22,.68,0,1.05);">
                    <div style="width:56px;height:56px;border-radius:50%;background:#fdf2f8;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;">
                        <svg width="26" height="26" fill="none" stroke="#de00a5" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                    </div>
                    <h2 style="font-size:18px;font-weight:800;color:#111827;margin:0 0 8px;letter-spacing:-0.01em;">You've been signed out</h2>
                    <p style="font-size:14px;color:#6b7280;margin:0 0 24px;line-height:1.55;">Your account was just signed in on another device. For your security, only one device can be active at a time.</p>
                    <button id="forced-signout-btn" style="background:#de00a5;color:#fff;font-weight:700;font-size:14px;padding:12px 28px;border-radius:12px;border:none;cursor:pointer;width:100%;transition:opacity 0.15s;">Go to Sign In</button>
                    <p style="font-size:12px;color:#9ca3af;margin:14px 0 0;">Redirecting automatically in <span id="forced-signout-countdown">5</span>s&hellip;</p>
                </div>
            `;
            document.body.appendChild(overlay);
            // Animate in
            requestAnimationFrame(() => {
                overlay.style.opacity = '1';
                overlay.firstElementChild.style.transform = 'translateY(0) scale(1)';
            });

            const goToLogin = async () => {
                await firebaseSignOut();
                window.location.href = 'index.html';
            };
            document.getElementById('forced-signout-btn').onclick = goToLogin;
            document.getElementById('forced-signout-btn').onmouseenter = e => e.target.style.opacity = '0.9';
            document.getElementById('forced-signout-btn').onmouseleave = e => e.target.style.opacity = '1';

            // Countdown + auto-redirect
            let secondsLeft = 5;
            const countdownEl = document.getElementById('forced-signout-countdown');
            const interval = setInterval(() => {
                secondsLeft -= 1;
                if (countdownEl) countdownEl.textContent = secondsLeft;
                if (secondsLeft <= 0) {
                    clearInterval(interval);
                    goToLogin();
                }
            }, 1000);
        }

        // Re-claim session when tab regains focus (catches reopened tabs)
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && _currentUser) {
                // Just re-check via the existing snapshot listener — no action needed
                // unless we want to re-claim ownership on focus (optional, kept passive)
            }
        });

        // ── Auth change: check enrollment, set _currentUser ──────────────────
        onAuthChange(async (user) => {
            if (!user) return;  // main module handles redirect to index
            _currentUser = user;

            // ── Claim this session as active, watch for takeover ─────────────
            enforceSingleSession(user);

            // ── Watermark with user's email (subtle, bottom-right) ────────────
            const wm = document.getElementById('ci-watermark');
            if (wm) wm.textContent = `${user.email || user.displayName || ''} · CI Minds`;

            // ── Disable right-click context menu on protected content ────────
            document.addEventListener('contextmenu', (e) => {
                if (e.target.closest('.protected-content')) {
                    e.preventDefault();
                    showToast('Right-click is disabled on lesson content.', 'info');
                }
            });

            // ── Disable copy on protected content ─────────────────────────────
            document.addEventListener('copy', (e) => {
                if (e.target.closest && e.target.closest('.protected-content')) {
                    e.preventDefault();
                }
            });

            // ── Check localStorage FIRST (instant — survives Firestore lag) ──
            try {
                const localKey = 'cbkCourseState_' + user.uid;
                const local = JSON.parse(localStorage.getItem(localKey) || '{}');
                if (local.enrolled === true) {
                    state.enrolled  = true;
                    state.paymentId = local.paymentId || null;
                    renderSidebar();
                    if (state.view === 'overview') navigate('overview', null, false);
                }
            } catch(_) {}

            // ── Then verify with Firestore (authoritative) ───────────────────
            try {
                const snap = await getDoc(doc(db, 'users', user.uid));
                if (snap.exists()) {
                    const data = snap.data();
                    if (data.enrolled === true) {
                        state.enrolled   = true;
                        state.enrolledAt = data.enrolledAt || null;
                        state.paymentId  = data.paymentId  || null;
                        renderSidebar();
                        if (state.view === 'overview') navigate('overview', null, false);
                    }
                    // If Firestore doesn't have enrolled yet but localStorage does,
                    // retry the Firestore write (handles the case where first write failed)
                    else if (state.enrolled === true && state.paymentId) {
                        console.log('[CI Minds] Resyncing payment to Firestore...');
                        try {
                            await setDoc(doc(db, 'users', user.uid), {
                                enrolled:   true,
                                enrolledAt: serverTimestamp(),
                                paymentId:  state.paymentId
                            }, { merge: true });
                            console.log('[CI Minds] Firestore resync successful');
                        } catch(e) {
                            console.warn('[CI Minds] Firestore resync failed:', e.message);
                        }
                    }
                }
            } catch (err) {
                console.warn('[CI Minds] Enrollment check failed:', err.message);
                // Firestore failed — rely on localStorage value already set above
            }
        });
    </script>
</body>
