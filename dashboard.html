<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AI Fast-Track | CBK Innovative Minds</title>

    <!-- ── Fonts ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">

    <!-- ── Tailwind CDN + config ── -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Nunito', 'sans-serif'] },
                    colors: {
                        primary:    '#6366F1',
                        'primary-dark': '#4F46E5',
                        'primary-light': '#818CF8',
                        surface:    '#111111',
                        'surface-2':'#171717',
                        'surface-3':'#1E1E1E',
                        background: '#0D0D0D',
                        'text-base':'#F0EFFF',
                        'text-muted':'rgba(240,239,255,0.45)',
                    },
                    borderRadius: { 'bento': '16px', 'bento-lg': '20px' },
                    boxShadow: {
                        'bento':      '0 1px 2px rgba(0,0,0,0.4)',
                        'bento-hover':'0 8px 32px rgba(99,102,241,0.18)',
                        'violet':     '0 4px 24px rgba(99,102,241,0.35)',
                    },
                    animation: {
                        'fade-in':       'fadeIn 0.3s ease-out',
                        'slide-in-right':'slideInRight 0.3s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn:       { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        slideInRight: { '0%': { transform: 'translateX(100%)', opacity: '0' }, '100%': { transform: 'translateX(0)', opacity: '1' } }
                    }
                }
            }
        }
    </script>

    <!-- ── App stylesheet ── -->
    <link rel="stylesheet" href="./assets/style.css">

    <!-- ── PDF library ── -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="font-sans h-screen overflow-hidden flex relative" style="background:#0D0D0D;color:#F0EFFF;font-family:'Nunito',sans-serif;">


    <div id="mobile-overlay" class="fixed inset-0 z-20 hidden md:hidden transition-opacity" style="background:rgba(0,0,0,0.65)" onclick="toggleMobileMenu()"></div>

    <aside id="sidebar" style="
        position:fixed; top:0; left:0; bottom:0;
        width:256px; flex-shrink:0;
        background:#0F0F0F;
        border-right:1px solid rgba(255,255,255,0.06);
        display:flex; flex-direction:column;
        z-index:30;
        transform:translateX(-100%);
        transition:transform 0.3s cubic-bezier(.16,1,.3,1);
        font-family:'Nunito',sans-serif;
    " class="cbk-sidebar">

        <!-- Logo header -->
        <div onclick="navigate('dashboard')" style="
            height:64px; display:flex; align-items:center;
            padding:0 20px; gap:11px; cursor:pointer;
            border-bottom:1px solid rgba(255,255,255,0.06);
            flex-shrink:0;
            transition:background 0.15s;
        " onmouseenter="this.style.background='rgba(99,102,241,0.05)'" onmouseleave="this.style.background='transparent'">
            <div style="
                width:34px; height:34px; border-radius:9px;
                background:#4F46E5;
                display:flex; align-items:center; justify-content:center;
                flex-shrink:0;
            ">
                <svg width="18" height="18" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
            </div>
            <span style="font-size:15px; font-weight:800; color:#F0EFFF; letter-spacing:-0.01em;">CBK Minds</span>
        </div>

        <!-- Nav -->
        <nav id="sidebar-nav" style="flex:1; overflow-y:auto; padding:16px 12px 12px;"></nav>

        <!-- Bottom actions -->
        <div style="padding:12px; border-top:1px solid rgba(255,255,255,0.06); flex-shrink:0;">
            <button onclick="navigate('profile')" style="
                display:flex; align-items:center; gap:10px;
                width:100%; padding:9px 12px;
                background:none; border:none; border-radius:9px; cursor:pointer;
                font-size:13px; font-weight:600; color:rgba(240,239,255,0.5);
                font-family:'Nunito',sans-serif; text-align:left;
                transition:background 0.15s, color 0.15s;
            " onmouseenter="this.style.background='rgba(255,255,255,0.05)';this.style.color='rgba(240,239,255,0.85)'" onmouseleave="this.style.background='none';this.style.color='rgba(240,239,255,0.5)'">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                My Profile
            </button>
            <button id="sidebar-reset-btn" onclick="resetData()" style="
                display:flex; align-items:center; gap:10px;
                width:100%; margin-top:2px; padding:9px 12px;
                background:none; border:none; border-radius:9px; cursor:pointer;
                font-size:13px; font-weight:600; color:rgba(248,113,113,0.6);
                font-family:'Nunito',sans-serif; text-align:left;
                transition:background 0.15s, color 0.15s;
            " onmouseenter="this.style.background='rgba(239,68,68,0.08)';this.style.color='#F87171'" onmouseleave="this.style.background='none';this.style.color='rgba(248,113,113,0.6)'">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                Reset Progress
            </button>
        </div>
    </aside>

    <div style="flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0;position:relative;">
        <header style="height:56px;background:#0F0F0F;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:10;flex-shrink:0;">
            <div style="display:flex;align-items:center;gap:10px;">
                <button onclick="openMobDrawer()" class="mob-menu-btn" style="display:none;padding:6px;margin-left:-4px;color:rgba(240,239,255,0.5);background:none;border:none;border-radius:9px;cursor:pointer;width:36px;height:36px;align-items:center;justify-content:center;transition:background 0.15s,color 0.15s;" onmouseenter="this.style.background='rgba(255,255,255,0.06)';this.style.color='rgba(240,239,255,0.9)'" onmouseleave="this.style.background='none';this.style.color='rgba(240,239,255,0.5)'" aria-label="Menu">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
            </div>
            
            <div id="global-timer-display" class="hide flex items-center bg-gray-100 px-4 py-1.5 rounded-full text-sm font-bold text-gray-900 border border-gray-200 shadow-sm mx-auto md:mx-0 md:mr-auto">
                <svg class="w-4 h-4 mr-2 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span id="global-time-left">30:00</span>
            </div>
            
            <div class="flex-1 flex justify-end items-center space-x-3 md:space-x-6">
                <div class="nav-progress-wrap hidden sm:flex items-center space-x-3" title="Course Progress">
                    <div style="font-size:12px;font-weight:600;color:rgba(240,239,255,0.4);font-family:'Nunito',sans-serif;">Progress: <span id="nav-progress-text" style="font-weight:800;color:rgba(240,239,255,0.8);">0%</span></div>
                    <div class="w-32 h-2.5 rounded-full overflow-hidden" style="background:rgba(255,255,255,0.08)">
                        <div id="nav-progress-bar" class="h-full bg-gray-900 transition-all duration-700 ease-out" style="width: 0%"></div>
                    </div>
                </div>

                <!-- Compact circular progress, mobile only — header has no room for the full bar+label -->
                <div class="mob-progress-ring sm:hidden flex items-center justify-center" title="Course Progress" style="position:relative; width:34px; height:34px;">
                    <svg width="34" height="34" viewBox="0 0 34 34" style="transform:rotate(-90deg);">
                        <circle cx="17" cy="17" r="14" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="3.5"></circle>
                        <circle id="mob-progress-ring-bar" cx="17" cy="17" r="14" fill="none" stroke="#6366F1" stroke-width="3.5"
                                stroke-dasharray="87.96" stroke-dashoffset="87.96" stroke-linecap="round"
                                style="transition: stroke-dashoffset 0.7s ease-out;"></circle>
                    </svg>
                    <span id="mob-progress-ring-text" style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; color:#818CF8;">0%</span>
                </div>
                
                <div style="width:1px;height:20px;background:rgba(255,255,255,0.08);" class="hidden sm:block"></div>
                
                <div class="relative">
                    <button onclick="toggleDropdown('profile-menu')" style="display:flex;align-items:center;gap:8px;background:none;border:none;cursor:pointer;" aria-label="Profile menu">
                        <img src="https://ui-avatars.com/api/?name=User&background=4F46E5&color=fff&rounded=true" alt="User Avatar" id="header-avatar" style="width:32px;height:32px;border-radius:50%;border:2px solid rgba(99,102,241,0.4);transition:border-color 0.15s;position:relative;z-index:1;" onmouseenter="this.style.borderColor='rgba(99,102,241,0.9)'" onmouseleave="this.style.borderColor='rgba(99,102,241,0.4)'">
                        <svg style="width:14px;height:14px;color:rgba(240,239,255,0.3);" class="hidden md:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </button>
                    <div id="profile-menu" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-2xl shadow-lg border border-gray-100 py-2 z-50 animate-fade-in">
                        <div class="px-4 py-2 border-b border-gray-100 mb-1">
                            <p class="text-sm font-bold text-gray-900 tracking-wide" id="dropdown-username">—</p>
                        </div>
                        <button onclick="navigate('profile'); toggleDropdown('profile-menu')" class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 hover:text-gray-900 transition-colors">My Profile</button>
                    </div>
                </div>
            </div>
        </header>

        <main id="app-container" class="flex-1 overflow-y-auto bg-background p-4 md:p-8 relative"></main>
    </div>

    <!-- Subtle identity watermark — populated once user is known -->
    <div id="ci-watermark"></div>

    <!-- ── MOBILE BOTTOM NAV ── -->
    <nav id="bottom-nav" aria-label="Mobile navigation">
        <button class="bnav-btn active" id="bnav-overview" onclick="navigate('overview');syncBottomNav('overview')" aria-label="Overview">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            Overview<div class="bnav-dot"></div>
        </button>
        <button class="bnav-btn" id="bnav-dashboard" onclick="navigate('dashboard');syncBottomNav('dashboard')" aria-label="Home">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            Home<div class="bnav-dot"></div>
        </button>
        <button class="bnav-btn" id="bnav-learn" onclick="goLearnNext();syncBottomNav('learn')" aria-label="Learn">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
            Learn<div class="bnav-dot"></div>
        </button>
        <button class="bnav-btn" id="bnav-profile" onclick="navigate('profile');syncBottomNav('profile')" aria-label="Profile">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            Profile<div class="bnav-dot"></div>
        </button>
    </nav>

    <!-- ── MOBILE DRAWER ── -->
    <div id="mob-overlay" onclick="closeMobDrawer()"></div>
    <aside id="mob-drawer" style="font-family:'Nunito',sans-serif;">
        <!-- Drawer header with logo -->
        <div id="mob-drawer-header" style="
            height:60px; display:flex; align-items:center; justify-content:space-between;
            padding:0 16px; border-bottom:1px solid rgba(255,255,255,0.06);
            flex-shrink:0; background:#0F0F0F;
        ">
            <div style="display:flex;align-items:center;gap:10px;cursor:pointer;" onclick="navigate('dashboard');closeMobDrawer()">
                <div style="
                    width:32px; height:32px; border-radius:8px;
                    background:#4F46E5;
                    display:flex; align-items:center; justify-content:center; flex-shrink:0;
                ">
                    <svg width="16" height="16" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>
                </div>
                <span style="font-size:14px;font-weight:800;color:#F0EFFF;letter-spacing:-0.01em;">CBK Minds</span>
            </div>
            <button onclick="closeMobDrawer()" style="
                background:rgba(255,255,255,0.06); border:none; cursor:pointer;
                width:30px; height:30px; border-radius:7px; display:flex;
                align-items:center; justify-content:center; color:rgba(240,239,255,0.5);
                flex-shrink:0;
            ">
                <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>
        <nav id="mob-drawer-nav" style="flex:1;overflow-y:auto;padding:14px 10px;background:#0F0F0F;"></nav>
        <div style="padding:10px;border-top:1px solid rgba(255,255,255,0.06);flex-shrink:0;background:#0F0F0F;">
            <button onclick="navigate('profile');closeMobDrawer()" style="
                display:flex;align-items:center;gap:9px;width:100%;
                padding:10px 12px;border:none;background:none;border-radius:9px;
                cursor:pointer;font-size:13px;font-weight:600;
                color:rgba(240,239,255,0.5);text-align:left;min-height:44px;
                font-family:'Nunito',sans-serif;transition:background 0.15s,color 0.15s;
            " onmouseenter="this.style.background='rgba(255,255,255,0.05)';this.style.color='rgba(240,239,255,0.85)'" onmouseleave="this.style.background='none';this.style.color='rgba(240,239,255,0.5)'">
                <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>My Profile
            </button>
            <button id="mob-sidebar-reset-btn" onclick="resetData()" style="
                display:flex;align-items:center;gap:9px;width:100%;
                padding:10px 12px;border:none;background:none;border-radius:9px;
                cursor:pointer;font-size:13px;font-weight:600;
                color:rgba(248,113,113,0.6);text-align:left;min-height:44px;
                font-family:'Nunito',sans-serif;transition:background 0.15s,color 0.15s;
            " onmouseenter="this.style.background='rgba(239,68,68,0.08)';this.style.color='#F87171'" onmouseleave="this.style.background='none';this.style.color='rgba(248,113,113,0.6)'">
                <svg width="15" height="15" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>Reset Progress
            </button>
        </div>
    </aside>

    <!-- ── Tutorial system ── -->
    <div id="tutorial-overlay">
        <div id="tutorial-card"></div>
    </div>
    <svg id="tutorial-arrow" style="position:fixed;inset:0;width:100vw;height:100vh;z-index:99999;pointer-events:none;display:none;" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <marker id="tut-arrowhead" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto-start-reverse">
                <path d="M0,0 L8,4 L0,8 Z" fill="#1a1a1a"/>
            </marker>
        </defs>
        <path id="tut-arrow-path" d="" fill="none" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="6 6" marker-end="url(#tut-arrowhead)"/>
    </svg>
    <button id="tutorial-help-btn" onclick="startTutorial(true)" title="Show guide" aria-label="Show guide">?</button>

    <!-- ── Toast container ── -->
    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3 pointer-events-none"></div>

    <!-- ── App logic ── -->
    <script src="./assets/app.js"></script>

    <!-- ── Razorpay SDK ── -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <!-- ── Payment & Auth Module (ESM) ── -->
    <script type="module" src="./assets/payment.js"></script>

</body>
</html>
