        --border-md: rgba(255,255,255,0.12);

        --text-2:    #aaaaaa;
        --text-3:    #666666;

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body {

    .wrap { max-width: 600px; margin: 0 auto; padding: 0 24px; }
    nav {
      border-bottom: 1px solid var(--border);
      height: 56px;
      display: flex;
      align-items: center;
    }
    .nav-inner {

    .ti {
      display: flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 500; color: var(--text-3);

    .ti svg { color: var(--green); flex-shrink: 0; }
    .ts { width: 3px; height: 3px; border-radius: 50%; background: var(--border-md); }
    .sup {
      text-align: center;

    footer {

    @keyframes spin { to { transform: rotate(360deg); } }
    .sp { animation: spin 0.65s linear infinite; }
    @media (max-width: 520px) {

      .input-row { flex-direction: column; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

        SSL protected
      </div>
    </section>

    <p class="sup">Need help? <a href="mailto:support@ciminds.in">support@ciminds.in</a></p>

  </div>
</main>

<footer>
  <div class="foot-in">
    <span class="foot-c">© <span id="yr"></span> CBK Innovative Minds</span>
    <nav class="foot-l" aria-label="Footer links">
      <a href="https://ciminds.in">Home</a>
      <a href="https://ciminds.in/course.html">Course</a>
      <a href="mailto:support@ciminds.in">Support</a>
    </nav>
  </div>
</footer>

<div id="toast" role="status" aria-live="polite"></div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js';
  import { initializeAppCheck, ReCaptchaV3Provider } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-app-check.js';
  import { initializeFirestore, doc, getDoc, updateDoc, increment, serverTimestamp } from 'https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js';

  const app = initializeApp({
    apiKey: 'AIzaSyBc0jyrxlCdA1mkDNN0u-VheCkGtskuaBw',
    authDomain: 'ciminds.firebaseapp.com',
    projectId: 'ciminds',
    storageBucket: 'ciminds.firebasestorage.app',
    messagingSenderId: '630925853512',
    appId: '1:630925853512:web:808ec2cdbeb8720c29297d'
  });
  try { initializeAppCheck(app, { provider: new ReCaptchaV3Provider('6Lcu8jEtAAAAAFkM1CANjfPHRt20O38Tm7TlO2K_'), isTokenAutoRefreshEnabled: true }); } catch(e) {}
  const db = initializeFirestore(app, { experimentalAutoDetectLongPolling: true });

  const _rl = { a: [], max: 10, w: 60000 };
  function rl() {
    const n = Date.now();
    _rl.a = _rl.a.filter(t => n - t < _rl.w);
    if (_rl.a.length >= _rl.max) return false;
    _rl.a.push(n); return true;
  }

  function san(s) {
    if (typeof s !== 'string') return s || '—';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#x27;');
  }

  function validate(raw) {
    const v = raw.trim().toUpperCase().replace(/\s+/g,'').replace(/[<>"'&]/g,'');
    if (!v) return { ok: false, e: 'Enter a certificate ID.', v: '' };
    if (!/^[A-Z0-9\-]{3,32}$/.test(v)) return { ok: false, e: 'Invalid format — example: CBK-2025-A3F9K2', v: '' };
    return { ok: true, e: '', v };
  }

  async function verify(id) {
    const s = await getDoc(doc(db, 'certificates', id));
    if (!s.exists()) return null;
    updateDoc(doc(db, 'certificates', id), { verifiedCount: increment(1), lastVerified: serverTimestamp() }).catch(()=>{});
    return s.data();
  }

  function dt(ts) {
    if (!ts) return '—';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });
  }
  function dts(ts) {
    if (!ts) return '—';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleString('en-IN', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  function skel() {
    return `<div class="card sk-card" aria-busy="true">
      <div class="sk-row"><div class="sk sk-cir"></div><div class="sk-ln"><div class="sk sk-l"></div><div class="sk sk-l s"></div></div></div>
      <div class="sk-g"><div class="sk sk-f"></div><div class="sk sk-f"></div><div class="sk sk-f"></div><div class="sk sk-f"></div></div>
    </div>`;
  }

  function notFound(id) {
    return `<div class="state-card">
      <div class="state-ico nf" aria-hidden="true"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
      <div class="state-h">Certificate not found</div>
      <p class="state-p">No certificate matches <strong>${san(id)}</strong>. Check the ID and try again, or contact <a href="mailto:support@ciminds.in">support@ciminds.in</a>.</p>
    </div>`;
  }

  function revoked(d) {
    return `<div class="res-card">
      <div class="res-head rv">
        <div class="status-icon rv" aria-hidden="true"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/></svg></div>
        <div><div class="res-title rv">Certificate revoked</div><div class="res-sub">This credential has been revoked by CI Minds</div></div>
        <span class="status-pill rv">Revoked</span>
      </div>
      <div class="res-body">
        <div class="fields">
          <div class="f"><div class="f-lbl">Certificate ID</div><div class="f-val mono">${san(d.certId)}</div></div>
          <div class="f"><div class="f-lbl">Student</div><div class="f-val">${san(d.studentName)}</div></div>
          <div class="f full"><div class="f-lbl">Course</div><div class="f-val">${san(d.courseName)}</div></div>
        </div>
        <p style="font-size:12px;color:var(--text-3);">Questions? <a href="mailto:support@ciminds.in" style="color:var(--accent);text-decoration:none;font-weight:500;">support@ciminds.in</a></p>
      </div>
    </div>`;
  }

  function expired(d) {
    return `<div class="res-card">
      <div class="res-head ex">
        <div class="status-icon ex" aria-hidden="true"><svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
        <div><div class="res-title ex">Certificate expired</div><div class="res-sub">This credential passed its validity period</div></div>
        <span class="status-pill ex">Expired</span>
      </div>
      <div class="res-body">
        <div class="fields">
          <div class="f"><div class="f-lbl">Certificate ID</div><div class="f-val mono">${san(d.certId)}</div></div>
          <div class="f"><div class="f-lbl">Student</div><div class="f-val">${san(d.studentName)}</div></div>
          <div class="f"><div class="f-lbl">Expired</div><div class="f-val">${dt(d.expiresAt)}</div></div>
          <div class="f"><div class="f-lbl">Course</div><div class="f-val">${san(d.courseName)}</div></div>
        </div>
      </div>
    </div>`;
  }

  function verified(d, id) {
    const url = `https://ciminds.in/verify?id=${id}`;
    return `<div class="res-card">
      <div class="res-head v">
        <div class="status-icon v" aria-hidden="true">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        </div>
        <div>
          <div class="res-title v">Certificate verified</div>
          <div class="res-sub">Authentic CI Minds credential</div>
        </div>
        <span class="status-pill v">Active</span>
      </div>
      <div class="res-body">
        <div class="fields">
          <div class="f"><div class="f-lbl">Student</div><div class="f-val">${san(d.studentName)}</div></div>
          <div class="f"><div class="f-lbl">Certificate ID</div><div class="f-val mono">${san(d.certId)}</div></div>
          <div class="f full"><div class="f-lbl">Course</div><div class="f-val">${san(d.courseName)}</div></div>
          <div class="f"><div class="f-lbl">Credential level</div><div class="f-val">${san(d.credentialLevel || 'Professional Certificate')}</div></div>
          <div class="f"><div class="f-lbl">Instructor</div><div class="f-val">${san(d.instructor || 'CI Minds Faculty')}</div></div>
          <div class="f"><div class="f-lbl">Issue date</div><div class="f-val">${dt(d.issueDate)}</div></div>
          <div class="f"><div class="f-lbl">Completion date</div><div class="f-val">${dt(d.completionDate)}</div></div>
          <div class="f"><div class="f-lbl">Verified at</div><div class="f-val">${dts({ toDate: () => new Date() })}</div></div>
          <div class="f full"><div class="f-lbl">Verification hash</div><div class="hash">${san(d.verificationHash || '—')}</div></div>
        </div>
        <div class="acts">
          <button class="act pri" onclick="copyLink('${url}')">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
            Copy link
          </button>
          <a class="act" href="https://www.linkedin.com/profile/add?startTask=CERTIFICATION_NAME&name=${encodeURIComponent(d.courseName)}&organizationName=CI+Minds&certUrl=${encodeURIComponent(url)}" target="_blank" rel="noopener">
            <svg width="12" height="12" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.225 0z"/></svg>
            LinkedIn
          </a>
          <button class="act" onclick="window.print()">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
            Print
          </button>
        </div>
      </div>
    </div>`;
  }

  function errState() {
    return `<div class="state-card">
      <div class="state-ico err" aria-hidden="true"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg></div>
      <div class="state-h">Verification unavailable</div>
      <p class="state-p">Could not connect to the verification server. Check your connection and try again.</p>
      <button class="act" onclick="handleVerify()" style="margin:0 auto;">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        Try again
      </button>
    </div>`;
  }

  window.handleVerify = async function() {
    const inp = document.getElementById('cert-input');
    const em  = document.getElementById('err-msg');
    const btn = document.getElementById('verify-btn');
    const ar  = document.getElementById('result-area');

    inp.classList.remove('err');
    em.classList.remove('on');
    em.textContent = '';

    const { ok, e, v } = validate(inp.value);
    if (!ok) { inp.classList.add('err'); em.textContent = e; em.classList.add('on'); inp.focus(); return; }
    if (!rl()) { em.textContent = 'Too many requests. Wait a moment.'; em.classList.add('on'); return; }

    inp.value = v;
    btn.disabled = true;
    btn.innerHTML = `<svg class="sp" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg> Verifying`;
    ar.innerHTML = skel();
    ar.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    try {
      const d = await verify(v);
      if (!d)                          ar.innerHTML = notFound(v);
      else if (d.status === 'revoked') ar.innerHTML = revoked(d);
      else if (d.status === 'expired') ar.innerHTML = expired(d);
      else                             ar.innerHTML = verified(d, v);
    } catch { ar.innerHTML = errState(); }
    finally {
      btn.disabled = false;
      btn.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg> Verify`;
    }
  };

  window.handleClear = function() {
    const inp = document.getElementById('cert-input');
    const em  = document.getElementById('err-msg');
    inp.value = ''; inp.classList.remove('err'); em.classList.remove('on');
    document.getElementById('result-area').innerHTML = '';
    inp.focus();
  };

  window.handleQRScan = function() {
    const mob = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    if (mob) {
      const fi = document.createElement('input');
      fi.type = 'file'; fi.accept = 'image/*'; fi.capture = 'environment';
      fi.style.display = 'none';
      fi.onchange = async e => {
        const f = e.target.files[0]; if (!f) return;
        toast('Processing QR code…');
        try {
          const Z = await import('https://cdn.jsdelivr.net/npm/@zxing/library@0.19.1/+esm');
          const r = new Z.BrowserQRCodeReader();
          const u = URL.createObjectURL(f);
          const res = await r.decodeFromImageUrl(u);
          URL.revokeObjectURL(u);
          const m = res.getText().match(/[?&]id=([A-Z0-9\-]+)/i);
          document.getElementById('cert-input').value = m ? m[1].toUpperCase() : res.getText().toUpperCase();
          handleVerify();
        } catch { toast('Could not read QR code. Enter the certificate ID manually.'); }
      };
      document.body.appendChild(fi); fi.click(); document.body.removeChild(fi);
    } else {
      window.open('https://lens.google.com', '_blank');
      toast('Google Lens opened — upload a photo of the certificate QR code.');
    }
  };

  window.copyLink = async function(url) {
    try { await navigator.clipboard.writeText(url); toast('Link copied.'); }
    catch { toast('Link: ' + url); }
  };

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('on');
    setTimeout(() => t.classList.remove('on'), 3000);
  }

  const p = new URLSearchParams(window.location.search);
  const uid = p.get('id') || p.get('cert');
  if (uid) { document.getElementById('cert-input').value = uid.trim().toUpperCase(); handleVerify(); }

  document.getElementById('cert-input').addEventListener('keydown', e => { if (e.key === 'Enter') handleVerify(); });
  document.getElementById('yr').textContent = new Date().getFullYear();
</script>
</body>
